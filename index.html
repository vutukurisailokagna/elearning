<html>
    <head>
        <title>html page</title>    
    <style>
    body
    {
        margin: 0%;
        background : url(f1.jpg);
        background-size: cover;
        background-repeat: no-repeat;
    }
    .menu{
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding:20px;
    }
    .menu nav ul{
        
        display: flex;
        list-style: none;
        gap: 100px;
    }
    .menu nav ul li{
        margin: left 20px;; 
    }
    .menu nav ul li a {
        text-decoration: none;
        font-size: 30px;
        color:lavender;
    }
    .logo{
        display: flex;
    }
    .logo img{
        width: 90px;
    }
    .logo h1
    {
        color:white;
        margin-top: 30px;
        margin-left: 10px;
    }
    </style>
    </head>
    <body>
    <div class="menu">
        <div class="logo">
            <img src="logo.png">
            <h1>The Floral Club </h1>
        </div>
        <nav>
        <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">New</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
        </ul>
        </nav>
    </div>
    </body>
</html>
